specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: BetSolutions
providerId: betsolutions
publisherName: BetSolutions
serviceCategory: iGaming Platform / Casino APIs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Betting
  - Casinos
  - Gaming
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for BetSolutions: B2B iGaming platform with revenue-share commercial
  structure on Gross Gaming Revenue plus integration fees. Costs are not API-call denominated; they
  scale with player wager volume and operator GGR.'
notes: No public revenue-share rate or integration fee schedule. Replace meter values with the operator's
  executed BetSolutions agreement once available.
sources:
  - https://docs.betsolutions.com/
  - https://www.betsolutions.com/
principles:
  - name: Visibility
    description: Use the Player and Slots APIs (rake / freespin / round data) to attribute platform cost
      to player segments, game studios, and campaigns.
  - name: Allocation
    description: Allocate revenue share by game module (slots vs table vs sportsbook) and by player segment
      so marketing / acquisition spend can be weighed against per-segment GGR.
  - name: Optimization
    description: Optimize game-mix and freespin-campaign economics — high-margin games and well-targeted
      campaigns reduce platform cost as a percentage of net revenue.
  - name: Accountability
    description: Operator's compliance + finance teams jointly own the BetSolutions relationship; review
      monthly GGR statements and revenue-share reconciliation.
billingModel:
  pricingCategory: Revenue Share + Integration Fees
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: BetSolutions Casino Platform
  ServiceCategory: iGaming Platform / Casino APIs
  ProviderName: BetSolutions
  PublisherName: BetSolutions
  InvoiceIssuerName: BetSolutions
  PricingCategory: Revenue Share
  PricingUnit: GGR
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: gross_gaming_revenue
    description: Operator GGR (wagers minus payouts) used as the revenue-share base
    unit: USD
    aggregation: sum
    dimensions:
      - operator
      - game_module
      - currency
  - name: wager_volume
    description: Total wager volume across modules
    unit: USD
    aggregation: sum
    dimensions:
      - operator
      - game_module
      - player_segment
  - name: rounds
    description: Game round count
    unit: round
    aggregation: sum
    dimensions:
      - game_module
      - game_studio
  - name: freespin_campaigns
    description: Freespin campaign cost (player liability incurred via promotional rounds)
    unit: USD
    aggregation: sum
    dimensions:
      - campaign
      - operator
  - name: integration_fees
    description: Setup / module / annual integration fees
    unit: month
    aggregation: sum
    dimensions:
      - operator
      - module
apis:
  - name: BetSolutions Wallet API
    baseURL: ''
    serviceName: BetSolutions Wallet API
    serviceCategory: API
  - name: BetSolutions Player API
    baseURL: ''
    serviceName: BetSolutions Player API
    serviceCategory: API
  - name: BetSolutions Slots API
    baseURL: ''
    serviceName: BetSolutions Slots API
    serviceCategory: API
  - name: BetSolutions Table Games API
    baseURL: ''
    serviceName: BetSolutions Table Games API
    serviceCategory: API
  - name: BetSolutions Provably Fair Games API
    baseURL: ''
    serviceName: BetSolutions Provably Fair Games API
    serviceCategory: API
  - name: BetSolutions Third-Party Integration API
    baseURL: ''
    serviceName: BetSolutions Third-Party Integration API
    serviceCategory: API
unitEconomics:
  - name: Platform Take Rate
    metric: revenue_share / gross_gaming_revenue
    target: per executed agreement
  - name: Cost per Round
    metric: (revenue_share + integration_fees) / rounds
    target: minimize via game-mix
