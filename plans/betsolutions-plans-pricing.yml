specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: BetSolutions
providerId: betsolutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Betting
  - Casinos
  - Gaming
  - Gambling
  - Slots
  - Sports Betting
description: BetSolutions is a B2B casino / gaming platform sold to licensed operators under a commercial
  integration agreement. The public docs describe technical integration (wallet, slots, table games,
  provably-fair, third-party sportsbook) but do not publish pricing, revenue share, or rate limits. Pricing
  is per operator contract — typical iGaming platform-provider economics involve revenue share / GGR
  share rather than per-API-call pricing.
notes: No public pricing. Operators must contact BetSolutions sales for revenue share, integration fees,
  and commercial terms. Reconcile against the executed operator agreement once available.
sources:
  - https://docs.betsolutions.com/
  - https://www.betsolutions.com/
plans:
  - id: betsolutions-operator
    name: Operator Integration
    type: enterprise
    description: Custom-priced operator integration covering selected modules (wallet mode, game library
      access, third-party integrations). Commercial structure is typically revenue share on GGR plus
      integration / setup fees.
    entries:
      - label: Integration Agreement
        description: Per-operator integration agreement covering selected modules
        name: integration_agreement
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://docs.betsolutions.com
        unit: 1
        price: contact BetSolutions sales
        userMultiplied: false
      - label: Revenue Share
        description: Typical iGaming platform commercial — revenue share on Gross Gaming Revenue (GGR);
          actual percentage is per-operator
        name: revenue_share
        type: metered
        metric: ggr
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://docs.betsolutions.com
        unit: 1
        price: contact sales (revenue share)
        userMultiplied: false
      - label: Game / Module Selection
        description: Module selection (wallet, slots, table games, provably-fair, sportsbook integration)
          drives commercial scope
        name: module_selection
        type: quota
        metric: module
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://docs.betsolutions.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: BetSolutions Wallet API (Transfer / Seamless Modes)
      - name: BetSolutions Player API
      - name: BetSolutions Slots API + Freespin Campaigns
      - name: BetSolutions Table Games API
      - name: BetSolutions Provably Fair Games API
      - name: BetSolutions Third-Party Integration API (Sportsbook)
      - name: SHA-256 Hash-Signed Authentication
      - name: Operator-Licensed Jurisdictions
